<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Login — RBAC System</title>
  <meta name="description" content="Sign in to your RBAC account."/>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-bg-orb orb1"></div>
  <div class="auth-bg-orb orb2"></div>
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🔐</div>
      <h1>Welcome back</h1>
      <p>Sign in to your RBAC account</p>
    </div>
    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input id="email" class="form-control" type="email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" class="form-control" type="password" placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      <div id="login-error" class="text-danger hidden" style="font-size:13px;margin-bottom:12px"></div>
      <button id="login-btn" class="btn btn-primary btn-full" type="submit">Sign In</button>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="register.html">Register</a>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/permission.js"></script>
<script src="js/ui.js"></script>
<script src="js/router.js"></script>
<script src="js/auth.js"></script>
<script>
document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault()
  const btn = document.getElementById("login-btn")
  const errEl = document.getElementById("login-error")
  errEl.classList.add("hidden")
  ui.setLoading(btn, true)
  try {
    await auth.login(
      document.getElementById("email").value.trim(),
      document.getElementById("password").value
    )
    window.location.href = "dashboard.html"
  } catch (err) {
    errEl.textContent = err.message || "Login failed."
    errEl.classList.remove("hidden")
    ui.setLoading(btn, false, "Sign In")
  }
})
</script>
</body>
</html>
