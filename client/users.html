<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Users — RBAC System</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">🔐</div><span>RB<em>AC</em></span></div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Main</span>
      <a href="dashboard.html" class="nav-link"><span class="icon">🏠</span> Dashboard</a>
      <a href="profile.html"   class="nav-link"><span class="icon">👤</span> My Profile</a>
      <span class="nav-section-label">Management</span>
      <a href="users.html" class="nav-link" data-permission="user:read"><span class="icon">👥</span> Users</a>
      <a href="roles.html" class="nav-link" data-permission="role:read"><span class="icon">🛡️</span> Roles</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="sidebar-avatar">A</div>
        <div class="user-details">
          <div class="user-name" id="sidebar-user-name">—</div>
          <div class="user-role" id="sidebar-user-role">—</div>
        </div>
      </div>
      <button id="logout-btn" class="btn btn-secondary btn-full mt-16" style="font-size:13px">🚪 Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>Users</h1>
      <p>Manage all user accounts in the system.</p>
    </div>

    <div class="toolbar">
      <div class="search-box">
        <span>🔍</span>
        <input id="search-input" type="text" placeholder="Search users…"/>
      </div>
      <button id="create-user-btn" class="btn btn-primary" data-permission="user:create">＋ New User</button>
    </div>

    <div class="table-wrap">
      <table id="users-table">
        <thead>
          <tr>
            <th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="users-tbody">
          <tr><td colspan="5" class="page-loader"><span class="loader"></span></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Create/Edit User Modal -->
<div class="modal-overlay" id="user-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">New User</h2>
      <button class="modal-close">✕</button>
    </div>
    <form id="user-form" novalidate>
      <input type="hidden" id="edit-user-id"/>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input id="f-name" class="form-control" type="text" placeholder="Jane Doe" required/>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input id="f-email" class="form-control" type="email" placeholder="jane@example.com" required/>
        </div>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Password <span id="pass-hint" class="text-muted">(leave blank to keep)</span></label>
          <input id="f-password" class="form-control" type="password" placeholder="••••••••"/>
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select id="f-role" class="form-control" required>
            <option value="">Select role…</option>
          </select>
        </div>
      </div>
      <div id="user-form-error" class="text-danger hidden" style="font-size:13px;margin-bottom:8px"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary modal-close">Cancel</button>
        <button type="submit" id="save-user-btn" class="btn btn-primary">Save User</button>
      </div>
    </form>
  </div>
</div>
<div id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/permission.js"></script>
<script src="js/ui.js"></script>
<script src="js/router.js"></script>
<script src="js/auth.js"></script>
<script>
let allUsers = []

async function loadRolesIntoSelect() {
  try {
    const r = await api.getRoles()
    const sel = document.getElementById("f-role")
    r.data.forEach(role => {
      const opt = document.createElement("option")
      opt.value = role.code
      opt.textContent = role.name
      sel.appendChild(opt)
    })
  } catch { /* roles unavailable */ }
}

async function loadUsers() {
  try {
    const r = await api.getUsers()
    allUsers = r.data
    renderUsers(allUsers)
  } catch (err) {
    document.getElementById("users-tbody").innerHTML =
      `<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">⚠️</div><p>${err.message}</p></div></td></tr>`
  }
}

function renderUsers(users) {
  const tbody = document.getElementById("users-tbody")
  if (!users.length) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><div class="empty-icon">👥</div><p>No users found</p></div></td></tr>`
    return
  }
  tbody.innerHTML = users.map(u => {
    const canEdit   = permission.can("user:update")
    const canDelete = permission.can("user:delete")
    const isSelf    = u._id === localStorage.getItem("rbac_user_id")
    const canSelfEdit = isSelf && permission.can("user:self_edit")
    const showEdit  = canEdit || canSelfEdit
    return `<tr>
      <td><strong>${u.name || "—"}</strong></td>
      <td>${u.email}</td>
      <td><span class="badge badge-purple">${u.role?.name || "—"}</span></td>
      <td><span class="badge ${u.isActive !== false ? 'badge-green' : 'badge-red'}">${u.isActive !== false ? 'Active' : 'Inactive'}</span></td>
      <td><div class="td-actions">
        ${showEdit  ? `<button class="btn-icon" onclick="openEdit('${u._id}')" title="Edit">✏️</button>` : ""}
        ${canDelete ? `<button class="btn-icon" onclick="deleteUser('${u._id}')" title="Delete">🗑️</button>` : ""}
      </div></td>
    </tr>`
  }).join("")
}

function openCreate() {
  document.getElementById("modal-title").textContent = "New User"
  document.getElementById("user-form").reset()
  document.getElementById("edit-user-id").value = ""
  document.getElementById("pass-hint").classList.add("hidden")
  document.getElementById("f-password").required = true
  ui.openModal("user-modal")
}

async function openEdit(id) {
  document.getElementById("modal-title").textContent = "Edit User"
  document.getElementById("pass-hint").classList.remove("hidden")
  document.getElementById("f-password").required = false
  const user = allUsers.find(u => u._id === id)
  if (!user) return
  document.getElementById("edit-user-id").value = id
  document.getElementById("f-name").value  = user.name || ""
  document.getElementById("f-email").value = user.email
  document.getElementById("f-role").value  = user.role?.code || ""
  ui.openModal("user-modal")
}

async function deleteUser(id) {
  if (!ui.confirm("Delete this user?")) return
  try {
    await api.deleteUser(id)
    ui.toast("User deleted.", "success")
    loadUsers()
  } catch (err) { ui.toast(err.message, "error") }
}

document.getElementById("user-form").addEventListener("submit", async (e) => {
  e.preventDefault()
  const btn   = document.getElementById("save-user-btn")
  const errEl = document.getElementById("user-form-error")
  errEl.classList.add("hidden")
  ui.setLoading(btn, true)
  const id = document.getElementById("edit-user-id").value
  const body = {
    name:  document.getElementById("f-name").value.trim(),
    email: document.getElementById("f-email").value.trim(),
    role:  document.getElementById("f-role").value
  }
  const pwd = document.getElementById("f-password").value
  if (pwd) body.password = pwd
  try {
    if (id) await api.updateUser(id, body)
    else    await api.createUser(body)
    ui.toast(`User ${id ? "updated" : "created"}.`, "success")
    ui.closeModal("user-modal")
    loadUsers()
  } catch (err) {
    errEl.textContent = err.message
    errEl.classList.remove("hidden")
  }
  ui.setLoading(btn, false, "Save User")
})

document.getElementById("search-input").addEventListener("input", (e) => {
  const q = e.target.value.toLowerCase()
  renderUsers(allUsers.filter(u => u.name?.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)))
})

const createBtn = document.getElementById("create-user-btn")
if (createBtn) createBtn.addEventListener("click", openCreate)

document.addEventListener("DOMContentLoaded", () => {
  loadUsers()
  loadRolesIntoSelect()
})
</script>
</body>
</html>
